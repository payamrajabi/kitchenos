# Deploy app/recipes-next to the existing Vercel project:
#   https://vercel.com/finnandco/recipes-ui
#
# One-time (Vercel UI — recommended):
# 1. Open that project → Settings → Git → Connect Repository → choose this repo (kitchenos).
# 2. Set Root Directory to: app/recipes-next  (not the repo root).
# 3. Production + Preview env: NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY
#    (optional: NEXT_PUBLIC_SUPABASE_RECIPE_BUCKET=recipe-images).
# 4. Deploy. Pushes to main will then update recipes-ui automatically.
#
# Alternative — GitHub Action secrets (same project):
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID from finnandco/recipes-ui settings / `vercel link`.

name: Deploy recipes-next (Vercel)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/recipes-next/**"
      - ".github/workflows/deploy-recipes-next-vercel.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/recipes-next

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/recipes-next/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
