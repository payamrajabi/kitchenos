# Optional: brew install xcodegen && cd ios && xcodegen generate
name: KitchenOS
options:
  bundleIdPrefix: com.kitchenos
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0

targets:
  KitchenOS:
    type: application
    platform: iOS
    sources:
      - path: KitchenOS
        excludes:
          - "**/*.example.swift"
    dependencies:
      - package: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kitchenos.app
        INFOPLIST_KEY_CFBundleDisplayName: KitchenOS
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: KitchenOS/Info.plist
        SWIFT_VERSION: "5.0"
